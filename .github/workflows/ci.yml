name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

# TODO: CI improvements to adopt
# - Concurrency control: cancel in-progress runs on same branch to save CI minutes
# - pip caching: actions/cache for ~/.cache/pip to speed up installs
# - MHCflurry data caching: cache ~/.local/share/mhcflurry keyed on downloads.yml hash

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
      - name: Build Conda environment
        uses: conda-incubator/setup-miniconda@v2
        with:
          activate-environment: test-environment
          environment-file: test-environment.yml
          python-version: ${{ matrix.python-version }}
          auto-activate-base: false

      - name: Install python dependencies
        run: |
          pip install --upgrade pip
          pip install flake8 nose-py3 pytest pytest-cov coveralls
          pip install -r requirements.txt
          pip install -r docs/requirements.txt
          pip install .
      #- name: Lint with flake8
      #  run: |
      #    # stop the build if there are Python syntax errors or undefined names
      #    flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      #    # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
      #    # flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Download data and models
        run: |
          mhcflurry-downloads fetch data_curated data_mass_spec_annotated models_class1 models_class1_presentation models_class1_processing models_class1_pan allele_sequences

      - name: Test with pytest
        run: |
          pytest --tb=long --cov=mhcflurry/ --cov-report=term-missing ./test

      # - name: Publish coverage to Coveralls
      #  uses: coverallsapp/github-action@v2.2.3
      #  with:
      #    parallel: true

  gpu:
    # Runs on merges to master and tagged releases.
    # For PRs, add the "gpu-ci" label to trigger.
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'gpu-ci'))
    needs: build
    runs-on: gpu-linux-l4-public

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify GPU is available
        run: nvidia-smi

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Build Conda environment
        uses: conda-incubator/setup-miniconda@v2
        with:
          activate-environment: test-environment
          environment-file: test-environment.yml
          python-version: "3.12"
          auto-activate-base: false

      - name: Install python dependencies
        run: |
          pip install --upgrade pip
          pip install pytest
          pip install -r requirements.txt
          pip install .

      - name: Download data and models
        run: |
          mhcflurry-downloads fetch data_curated data_mass_spec_annotated models_class1 models_class1_presentation models_class1_processing models_class1_pan allele_sequences

      - name: Test with pytest (GPU)
        run: |
          pytest --tb=long ./test
