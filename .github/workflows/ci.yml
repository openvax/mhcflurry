name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MHCFLURRY_DATA_DIR: ${{ github.workspace }}/.mhcflurry-data
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            docs/requirements.txt
            setup.py

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Cache Conda packages
        uses: actions/cache@v4
        env:
          CACHE_NUMBER: 0
        with:
          path: ~/conda_pkgs_dir
          key: conda-${{ runner.os }}-${{ matrix.python-version }}-${{ env.CACHE_NUMBER }}-${{ hashFiles('test-environment.yml') }}
          restore-keys: |
            conda-${{ runner.os }}-${{ matrix.python-version }}-${{ env.CACHE_NUMBER }}-

      - name: Build Conda environment
        uses: conda-incubator/setup-miniconda@v4
        with:
          activate-environment: test-environment
          environment-file: test-environment.yml
          python-version: ${{ matrix.python-version }}
          auto-activate: false
          use-only-tar-bz2: true

      - name: Lint shell scripts
        run: |
          # Catch syntax regressions in the training-pipeline shell
          # wrappers cheaply. ``bash -n`` parses without executing.
          set -e
          mapfile -t shell_scripts < <(find scripts -type f -name "*.sh")
          for script in "${shell_scripts[@]}"; do
              echo "bash -n $script"
              bash -n "$script"
          done

      - name: Install python dependencies
        run: |
          pip install --upgrade pip
          pip install flake8 nose-py3 pytest pytest-cov coveralls
          pip install -r requirements.txt
          pip install -r docs/requirements.txt
          pip install .
      #- name: Lint with flake8
      #  run: |
      #    # stop the build if there are Python syntax errors or undefined names
      #    flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      #    # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
      #    # flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Cache MHCflurry downloads
        uses: actions/cache@v4
        with:
          path: .mhcflurry-data
          key: mhcflurry-data-${{ runner.os }}-${{ hashFiles('mhcflurry/downloads.yml') }}
          restore-keys: |
            mhcflurry-data-${{ runner.os }}-

      - name: Download data and models
        run: |
          mhcflurry-downloads fetch data_curated data_mass_spec_annotated models_class1 models_class1_presentation models_class1_processing models_class1_pan allele_sequences

      - name: Test with pytest
        run: |
          pytest --tb=long --cov=mhcflurry/ --cov-report=term-missing ./test

      # - name: Publish coverage to Coveralls
      #  uses: coverallsapp/github-action@v2.2.3
      #  with:
      #    parallel: true
